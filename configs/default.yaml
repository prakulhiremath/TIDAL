# TIDAL Default Configuration
# Temporal AI for Early Detection of Latent Financial Market Instability
# -----------------------------------------------------------------------
# All experiments are config-driven. Override any field via CLI:
#   python experiments/run_tidal.py --config configs/default.yaml key=value

experiment:
  name: "tidal_default"
  seed: 42
  output_dir: "results"
  checkpoint_dir: "results/checkpoints"
  log_dir: "results/logs"
  device: "auto"            # "auto" | "cpu" | "cuda" | "mps"

data:
  dataset: "fi2010"         # "fi2010" | "crypto"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  horizons: [10, 30, 60]   # Prediction horizons (steps ahead)
  seq_len: 100              # Sliding-window sequence length
  step_size: 1              # Sliding-window step (1 = full overlap)
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15
  # FI-2010 specific
  fi2010:
    n_levels: 10            # LOB depth (10-level standard)
    normalization: "zscore" # "zscore" | "minmax" | "robust"
    auction: false          # Exclude auction periods
  # Crypto specific
  crypto:
    symbol: "BTCUSDT"
    freq: "1s"              # Tick frequency

instability:
  # Composite instability index:  I_t = α·V_t + β·S_t + γ·L_t + δ·O_t
  weights:
    alpha: 0.35             # Realized volatility weight
    beta: 0.25              # Spread stress weight
    gamma: 0.20             # Liquidity deterioration weight
    delta: 0.20             # Order imbalance persistence weight
  # Rolling window for each component (in steps)
  vol_window: 20
  spread_window: 20
  liquidity_window: 20
  imbalance_window: 20
  # Adaptive threshold: mean + k * std of rolling instability index
  threshold_k: 1.5
  threshold_window: 500     # Rolling window for threshold computation
  # Three-regime labels
  regime_thresholds:
    stable_upper: 0.33      # I_t < stable_upper  → label 0 (Stable)
    unstable_lower: 0.66    # I_t > unstable_lower → label 2 (Unstable)
    # else                                        → label 1 (Transitional)

model:
  name: "tidal"             # "tidal" | "lstm" | "transformer" | "ssm"
  input_dim: 40             # FI-2010: 10 levels × 4 features (p_bid,v_bid,p_ask,v_ask)
  hidden_dim: 128
  num_layers: 3
  num_heads: 8              # Transformer / TIDAL attention heads
  dropout: 0.1
  output_horizons: [10, 30, 60]
  num_classes: 3            # Stable | Transitional | Unstable
  # TIDAL-specific
  tidal:
    ssm_dim: 64             # SSM state dimension
    ssm_layers: 2
    attn_layers: 2
    fusion: "gated"         # "gated" | "concat" | "add"
  # LSTM-specific
  lstm:
    bidirectional: true
  # Transformer-specific
  transformer:
    ff_dim: 256
    max_seq_len: 200
  # SSM-specific (requires mamba-ssm on CUDA, falls back to S4-lite)
  ssm:
    state_dim: 64
    use_mamba: false        # Set true only with CUDA + mamba-ssm installed

training:
  batch_size: 64
  epochs: 50
  optimizer: "adamw"        # "adamw" | "adam" | "sgd"
  lr: 1.0e-3
  weight_decay: 1.0e-4
  lr_scheduler: "cosine"    # "cosine" | "step" | "plateau" | "none"
  lr_warmup_epochs: 3
  gradient_clip: 1.0
  mixed_precision: true     # AMP (auto-disabled on CPU/MPS)
  loss:
    type: "focal"           # "focal" | "ce" | "weighted_ce"
    focal_gamma: 2.0
    focal_alpha: null       # null = compute from class frequencies
  class_weights: "auto"     # "auto" (inverse freq) | null | [w0,w1,w2]
  multi_horizon_agg: "mean" # "mean" | "weighted" | "max"
  horizon_weights: [0.5, 0.3, 0.2]  # Weights for [h10, h30, h60]
  early_stopping:
    patience: 10
    monitor: "val_auroc"    # "val_auroc" | "val_loss" | "val_f1"
    mode: "max"             # "max" for auroc/f1, "min" for loss
    min_delta: 1.0e-4
  checkpointing:
    save_best: true
    save_last: true
    save_every_n_epochs: 0  # 0 = disabled

evaluation:
  batch_size: 256
  threshold: 0.5            # Operating threshold for binary metrics
  lead_time_window: 60      # Steps before onset to credit as early warning
  transition_margin: 10     # Steps around transition to evaluate sensitivity
  bootstrap_n: 1000         # Bootstrap replicates for confidence intervals
  significance_alpha: 0.05

logging:
  level: "INFO"
  tensorboard: true
  rich_console: true
  save_metrics_json: true
  log_every_n_steps: 50

reproducibility:
  deterministic: true       # torch.use_deterministic_algorithms(True)
  benchmark: false          # torch.backends.cudnn.benchmark
